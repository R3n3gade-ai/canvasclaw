name: Python Unit Test

# 触发条件
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# 环境变量
env:
  PYTHON_VERSION: "3.12"

jobs:
  # === 代码质量检查 ===
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff flake8 mypy bandit

      - name: Check code style with Black
        run: black --check jiuwenclaw tests

      - name: Lint with Ruff
        run: ruff check jiuwenclaw tests

      - name: Lint with Flake8
        run: flake8 jiuwenclaw tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Type check with Mypy
        run: mypy jiuwenclaw --ignore-missing-imports --no-strict-optional

      - name: Security scan with Bandit
        run: bandit -r jiuwenclaw -f json -o bandit-report.json

  # === 单元测试（核心门禁）===
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --cov=jiuwenclaw